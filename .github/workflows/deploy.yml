name: Deploy

on:
  push:
    branches: [master]
    paths:
      - 'services/backend/**'
      - 'apps/web/**'
      - 'infra/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  AWS_REGION: us-east-1

jobs:
  # ── Run tests first ────────────────────────
  test:
    uses: ./.github/workflows/ci.yml

  # ── Bootstrap ECR repos + CloudFormation ──
  bootstrap-infra:
    needs: test
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy CloudFormation stack (infra only)
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
        run: |
          PARAMS=("Environment=${ENVIRONMENT}")
          [[ -n "${{ vars.CLERK_PUBLISHABLE_KEY }}" ]]            && PARAMS+=("ClerkPublishableKey=${{ vars.CLERK_PUBLISHABLE_KEY }}")
          [[ -n "${{ vars.NOVAREEL_CLERK_JWKS_URL }}" ]]          && PARAMS+=("ClerkJwksUrl=${{ vars.NOVAREEL_CLERK_JWKS_URL }}")
          [[ -n "${{ vars.NOVAREEL_CLERK_ISSUER }}" ]]            && PARAMS+=("ClerkIssuer=${{ vars.NOVAREEL_CLERK_ISSUER }}")
          [[ -n "${{ vars.NOVAREEL_CLERK_AUDIENCE }}" ]]          && PARAMS+=("ClerkAudience=${{ vars.NOVAREEL_CLERK_AUDIENCE }}")
          [[ -n "${{ vars.NOVAREEL_CORS_ORIGIN }}" ]]             && PARAMS+=("CorsOrigin=${{ vars.NOVAREEL_CORS_ORIGIN }}")
          [[ -n "${{ vars.NOVAREEL_FRONTEND_URL }}" ]]            && PARAMS+=("FrontendUrl=${{ vars.NOVAREEL_FRONTEND_URL }}")
          [[ -n "${{ vars.NOVAREEL_GOOGLE_CLIENT_ID }}" ]]        && PARAMS+=("GoogleClientId=${{ vars.NOVAREEL_GOOGLE_CLIENT_ID }}")
          [[ -n "${{ vars.NOVAREEL_SOCIAL_REDIRECT_BASE_URL }}" ]] && PARAMS+=("SocialRedirectBaseUrl=${{ vars.NOVAREEL_SOCIAL_REDIRECT_BASE_URL }}")
          [[ -n "${{ secrets.CLERK_SECRET_KEY }}" ]]              && PARAMS+=("ClerkSecretKey=${{ secrets.CLERK_SECRET_KEY }}")
          [[ -n "${{ secrets.NOVAREEL_PEXELS_API_KEY }}" ]]       && PARAMS+=("PexelsApiKey=${{ secrets.NOVAREEL_PEXELS_API_KEY }}")
          [[ -n "${{ secrets.NOVAREEL_ELEVENLABS_API_KEY }}" ]]   && PARAMS+=("ElevenlabsApiKey=${{ secrets.NOVAREEL_ELEVENLABS_API_KEY }}")
          [[ -n "${{ secrets.NOVAREEL_GOOGLE_CLIENT_SECRET }}" ]] && PARAMS+=("GoogleClientSecret=${{ secrets.NOVAREEL_GOOGLE_CLIENT_SECRET }}")
          [[ -n "${{ secrets.NOVAREEL_ENCRYPTION_KEY }}" ]]       && PARAMS+=("EncryptionKey=${{ secrets.NOVAREEL_ENCRYPTION_KEY }}")

          aws cloudformation deploy \
            --template-file infra/cloudformation.yml \
            --stack-name "novareel-${ENVIRONMENT}" \
            --region ${{ env.AWS_REGION }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides "${PARAMS[@]}" \
            --no-fail-on-empty-changeset

  # ── Build and push API + Worker in parallel ──
  build-api:
    needs: bootstrap-infra
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    permissions:
      id-token: write
      contents: read
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image URI
        id: meta
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          TAG="${GITHUB_SHA::8}-$(date +%s)"
          echo "image=${REGISTRY}/novareel-${ENVIRONMENT}-api:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.api
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.ecr-login.outputs.registry }}/novareel-${{ github.event.inputs.environment || 'production' }}-api:latest
          cache-from: type=registry,ref=${{ steps.ecr-login.outputs.registry }}/novareel-${{ github.event.inputs.environment || 'production' }}-api:cache
          cache-to: type=registry,ref=${{ steps.ecr-login.outputs.registry }}/novareel-${{ github.event.inputs.environment || 'production' }}-api:cache,mode=max

  build-worker:
    needs: bootstrap-infra
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    permissions:
      id-token: write
      contents: read
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image URI
        id: meta
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          TAG="${GITHUB_SHA::8}-$(date +%s)"
          echo "image=${REGISTRY}/novareel-${ENVIRONMENT}-worker:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.worker
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.ecr-login.outputs.registry }}/novareel-${{ github.event.inputs.environment || 'production' }}-worker:latest
          cache-from: type=registry,ref=${{ steps.ecr-login.outputs.registry }}/novareel-${{ github.event.inputs.environment || 'production' }}-worker:cache
          cache-to: type=registry,ref=${{ steps.ecr-login.outputs.registry }}/novareel-${{ github.event.inputs.environment || 'production' }}-worker:cache,mode=max

  # ── Deploy to ECS ──────────────────────────
  deploy:
    needs: [build-api, build-worker]
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS with new image URIs
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
        run: |
          PARAMS=("Environment=${ENVIRONMENT}")
          [[ -n "${{ vars.CLERK_PUBLISHABLE_KEY }}" ]]            && PARAMS+=("ClerkPublishableKey=${{ vars.CLERK_PUBLISHABLE_KEY }}")
          [[ -n "${{ vars.NOVAREEL_CLERK_JWKS_URL }}" ]]          && PARAMS+=("ClerkJwksUrl=${{ vars.NOVAREEL_CLERK_JWKS_URL }}")
          [[ -n "${{ vars.NOVAREEL_CLERK_ISSUER }}" ]]            && PARAMS+=("ClerkIssuer=${{ vars.NOVAREEL_CLERK_ISSUER }}")
          [[ -n "${{ vars.NOVAREEL_CLERK_AUDIENCE }}" ]]          && PARAMS+=("ClerkAudience=${{ vars.NOVAREEL_CLERK_AUDIENCE }}")
          [[ -n "${{ vars.NOVAREEL_CORS_ORIGIN }}" ]]             && PARAMS+=("CorsOrigin=${{ vars.NOVAREEL_CORS_ORIGIN }}")
          [[ -n "${{ vars.NOVAREEL_FRONTEND_URL }}" ]]            && PARAMS+=("FrontendUrl=${{ vars.NOVAREEL_FRONTEND_URL }}")
          [[ -n "${{ vars.NOVAREEL_GOOGLE_CLIENT_ID }}" ]]        && PARAMS+=("GoogleClientId=${{ vars.NOVAREEL_GOOGLE_CLIENT_ID }}")
          [[ -n "${{ vars.NOVAREEL_SOCIAL_REDIRECT_BASE_URL }}" ]] && PARAMS+=("SocialRedirectBaseUrl=${{ vars.NOVAREEL_SOCIAL_REDIRECT_BASE_URL }}")
          [[ -n "${{ secrets.CLERK_SECRET_KEY }}" ]]              && PARAMS+=("ClerkSecretKey=${{ secrets.CLERK_SECRET_KEY }}")
          [[ -n "${{ secrets.NOVAREEL_PEXELS_API_KEY }}" ]]       && PARAMS+=("PexelsApiKey=${{ secrets.NOVAREEL_PEXELS_API_KEY }}")
          [[ -n "${{ secrets.NOVAREEL_ELEVENLABS_API_KEY }}" ]]   && PARAMS+=("ElevenlabsApiKey=${{ secrets.NOVAREEL_ELEVENLABS_API_KEY }}")
          [[ -n "${{ secrets.NOVAREEL_GOOGLE_CLIENT_SECRET }}" ]] && PARAMS+=("GoogleClientSecret=${{ secrets.NOVAREEL_GOOGLE_CLIENT_SECRET }}")
          [[ -n "${{ secrets.NOVAREEL_ENCRYPTION_KEY }}" ]]       && PARAMS+=("EncryptionKey=${{ secrets.NOVAREEL_ENCRYPTION_KEY }}")
          PARAMS+=("ApiImageUri=${{ needs.build-api.outputs.image }}")
          PARAMS+=("WorkerImageUri=${{ needs.build-worker.outputs.image }}")

          aws cloudformation deploy \
            --template-file infra/cloudformation.yml \
            --stack-name "novareel-${ENVIRONMENT}" \
            --region ${{ env.AWS_REGION }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides "${PARAMS[@]}" \
            --no-fail-on-empty-changeset

      - name: Wait for ECS services to stabilize
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
        run: |
          aws ecs wait services-stable \
            --cluster "novareel-${ENVIRONMENT}" \
            --services "novareel-${ENVIRONMENT}-api" "novareel-${ENVIRONMENT}-worker" \
            --region ${{ env.AWS_REGION }}

      - name: Health check
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
        run: |
          ALB_URL=$(aws cloudformation describe-stacks \
            --stack-name "novareel-${ENVIRONMENT}" \
            --query 'Stacks[0].Outputs[?OutputKey==`ALBURL`].OutputValue' \
            --output text)
          echo "Checking ${ALB_URL}/healthz ..."
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' "${ALB_URL}/healthz" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "API is healthy"
              exit 0
            fi
            echo "Attempt ${i}: HTTP ${HTTP_CODE}, retrying in 15s..."
            sleep 15
          done
          echo "Health check did not pass after 5 attempts"
          exit 1

      - name: Print stack outputs
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
        run: |
          aws cloudformation describe-stacks \
            --stack-name "novareel-${ENVIRONMENT}" \
            --query 'Stacks[0].Outputs' --output table
